<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="profile">
            <h2>Your name</h2>
            <p class="role">Front end Developer</p>
            <div class="tags">
                <span>HTML</span>
                <span>CSS</span>
                <span>React</span>
            </div>

            <div class="socials">
                <a href="#">Github</a>
                <a href="#">Linkedin</a>
                <a href="#">Portfolio</a>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="profile">
            <h2>Your name</h2>
            <p class="role">UI/UX Designer</p>
            <div class="tags">
                <span>Figma</span>
                <span>CSS</span>
                <span>Tailwind</span>
            </div>

            <div class="socials">
                <a href="#">Github</a>
                <a href="#">Linkedin</a>
                <a href="#">Portfolio</a>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="profile">
            <h2>Priya</h2>
            <p class="role">Backend Developer</p>
            <div class="tags">
                <span>Node.js</span>
                <span>Python </span>
                <span>Sql</span>
            </div>

            <div class="socials">
                <a href="#">Github</a>
                <a href="#">Linkedin</a>
                <a href="#">Portfolio</a>
            </div>
        </div>

    </div>
</body>

</html>
